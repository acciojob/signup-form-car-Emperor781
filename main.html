<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
    <script type="text/javascript" src="./script.js">
</script>

	<form method="post">
		<label for="name">Name: </label>
		<input type="text" id="name" required placeholder="Name">
		<br>

		<label for="email">Email: </label>
		<input type="email" id="email" required placeholder="Email" required>
		<br>

		<label for="gender">Gender: </label>
		<input type="radio" id="gender_m" name="gender" value="Male" required>
		<label for="Male">Male</label>
		<input type="radio" id="gender_f" name="gender" value="Female" required>
		<label for="Female">Female</label>
		<br>	

		<label for="cars">Car Brands:</label>
		<select id="cars" required>
			<option value="">--Please choose an  option--"</option>
			<option value="Audi">Audi</option>
			<option value="Benz">Benz</option>
			<option value="Maruti">Maruti</option>
			
		</select>
		<br>

		<label for="age">Age:</label>
		<input type="number" required id="age" placeholder="Age">
		<br>

		<label for="dob">DOB</label>
		<input type="date" required id="dob">
		<br>

		<label for="tel">Phone Number:</label>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx">
		<br>

		<label for="password">Password</label>
		<input type="password" id="password" required placeholder="Password">
		<br>

		<input type="checkbox" id="tos" required>
		<label for="tos">I agree to the TOS</label>
		<br>

		<button type="submit">Submit</button>
		
	</form>

</body>

</html>
